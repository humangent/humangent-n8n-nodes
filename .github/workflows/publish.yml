name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NPM_PUBLISH_TAG: ${{ vars.NPM_PUBLISH_TAG }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Validate release configuration
        run: |
          set -euo pipefail
          if [ -z "${NPM_PUBLISH_TAG:-}" ]; then
            echo "::error::Missing GitHub Actions variable NPM_PUBLISH_TAG. Use alpha, beta, next, or latest."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Verify tag matches package.json
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json.version ($PKG_VERSION)."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack smoke
        run: npm run pack:smoke

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance --tag "$NPM_PUBLISH_TAG"

      - name: n8n community package scanner
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          npx -y @n8n/scan-community-package@latest "@humangent/n8n-nodes-humangent@$PKG_VERSION"
