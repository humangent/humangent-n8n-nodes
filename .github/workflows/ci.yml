name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        if: always()
        run: npm run lint

      - name: Type-check
        if: always()
        run: npm run type-check

      - name: Unit tests
        if: always()
        run: npm test

      - name: Build
        if: always()
        run: npm run build

      - name: Pack smoke
        if: always()
        run: npm run pack:smoke

      - name: Fallow audit
        if: ${{ always() && github.event_name == 'pull_request' }}
        run: npm run audit -- --changed-since origin/${{ github.base_ref }}
